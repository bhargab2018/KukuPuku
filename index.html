<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love ❤️</title>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: linear-gradient(to bottom right, #ffd6ec, #ffe6f7);
}

h1 {
    margin-top: 50px;
    font-size: 3em;
    color: #ff4da6;
}

p {
    font-size: 1.3em;
    color: #444;
    padding: 0 20px;
}

img {
    width: 250px;
    margin: 10px;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: transform 0.3s ease;
}

img:hover {
    transform: scale(1.05);
}

/* Floating hearts */
.heart {
    position: fixed;
    bottom: -10px;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform: translateY(0); opacity:1;}
    100% {transform: translateY(-100vh); opacity:0;}
}
</style>
</head>
<body>

<h1>Happy Birthday My Love ❤️</h1>
<p>You are my favorite person in the world 💕  
Today is your special day, and I made this for you!</p>

<!-- 8 Photos -->
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">
<img src="photo6.jpg">
<img src="photo7.jpg">
<img src="photo8.jpg">

<!-- Floating hearts animation -->
<script>
setInterval(function(){
    var heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(function(){
        heart.remove();
    }, 6000);
}, 500);
</script>

</body>
</html>
